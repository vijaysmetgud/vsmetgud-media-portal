replicaCount: 1

image:
  repository: vsmetgud/media-portal
  tag: "b27793185172ea7cf6b0490ddeb19ac2a030e126"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: vsmetgud.online
  path: /
  pathType: Prefix

persistence:
  enabled: true
  mountPath: /usr/src/app/media
  hostPath: /mnt/media   # ⚠️ dev only

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: k8s-worker

autoscaling:
  enabled: false

# 🔥 ENV VARIABLES (UPDATED)
env:
  - name: NODE_ENV
    value: "production"

  - name: JWT_SECRET
    value: "change-this-secret"

  # 🔥 PostgreSQL
  - name: DB_HOST
    value: "postgres-service"
  - name: DB_PORT
    value: "5432"
  - name: DB_USER
    value: "mediauser"
  - name: DB_PASSWORD
    value: "securepassword"
  - name: DB_NAME
    value: "media_portal_db"

  # 🔥 Redis
  - name: REDIS_HOST
    value: "redis-service"
  - name: REDIS_PORT
    value: "6379"

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
