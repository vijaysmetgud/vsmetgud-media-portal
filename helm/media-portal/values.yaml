replicaCount: 1

image:
  repository: vsmetgud/media-portal
  tag: "aeda904f5e8330a7eb4f4911148613fb746c20da"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  nodePort: 30080

persistence:
  enabled: true
  mountPath: /usr/share/nginx/html/media
  hostPath: /mnt/media

ingress:
  enabled: false
  className: nginx
  host: vsmetgud.online

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: k8s-worker

autoscaling:
  enabled: false
