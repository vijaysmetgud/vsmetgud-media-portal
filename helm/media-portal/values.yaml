replicaCount: 1

image:
  repository: vsmetgud/media-portal
  tag: "99d23ac852071948409f3bed7c6cf1440eda68c5"
  pullPolicy: Always

service:
  type: NodePort
  port: 8080
  nodePort: 30080

persistence:
  enabled: true
  mountPath: /usr/src/app/app/media
  hostPath: /mnt/media

ingress:
  enabled: false
  className: nginx
  host: vsmetgud.online

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: k8s-worker

autoscaling:
  enabled: false
