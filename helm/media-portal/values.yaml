replicaCount: 1

image:
  repository: vsmetgud/media-portal
  tag: "a5ff204a564dea6cb8e49f513529df6d62fed2a3"
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  nodePort: 30080

persistence:
  enabled: true
  mountPath: /usr/share/nginx/html/media
  hostPath: /mnt/media

ingress:
  enabled: false
  className: nginx
  host: vsmetgud.online

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: k8s-worker

autoscaling:
  enabled: false
