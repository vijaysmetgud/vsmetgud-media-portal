replicaCount: 1

image:
  repository: vsmetgud/media-portal
  tag: "29d9283fbdbcac3c6482a227217fad28d5b1e1d2"
  pullPolicy: Always

service:
  type: NodePort
  port: 8080
  nodePort: 30080

persistence:
  enabled: true
  mountPath: /usr/src/app/media
  hostPath: /media/sf_e-drive
  #hostPath: /mnt/media

ingress:
  enabled: true
  className: nginx
  host: vsmetgud.online

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: k8s-worker

autoscaling:
  enabled: false
