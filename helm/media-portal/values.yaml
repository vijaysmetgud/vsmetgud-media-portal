replicaCount: 1

image:
  repository: vsmetgud/media-portal
  tag: "d7155013ec2b877ac9a0737ee263ddc9e9cfa634"
  pullPolicy: Always

service:
  type: NodePort
  port: 8080
  nodePort: 30080

persistence:
  enabled: true
  mountPath: /usr/src/app/media
  hostPath: /mnt/media

ingress:
  enabled: false
  className: nginx
  host: vsmetgud.online

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: k8s-worker

autoscaling:
  enabled: false
