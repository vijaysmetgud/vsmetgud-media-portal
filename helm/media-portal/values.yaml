replicaCount: 1

image:
  repository: vsmetgud/media-portal
  tag: "1c7c2ff1b8b60eafbeda98074f1818688ef355b3"
  pullPolicy: Always

service:
  type: NodePort
  port: 8080
  nodePort: 30080

persistence:
  enabled: true
  mountPath: /usr/src/app/media
  hostPath: /media/sf_e-drive
  #hostPath: /mnt/media

ingress:
  enabled: true
  className: nginx
  host: vsmetgud.online

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: k8s-worker

autoscaling:
  enabled: false
