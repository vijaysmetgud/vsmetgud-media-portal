---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-backend
  template:
    metadata:
      labels:
        app: media-backend
    spec:
      containers:
      - name: backend
        image: YOUR-DOCKER-IMAGE
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: postgres-service
        - name: REDIS_HOST
          value: redis-service
        - name: DB_USER
          value: mediauser
        - name: DB_PASSWORD
          value: securepassword
        - name: DB_NAME
          value: media_portal_db
        - name: JWT_SECRET
          value: supersecretkey123
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: media-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30007
---
