name: Dev Deployment Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/media-portal/values.yaml'

permissions:
  contents: write

env:
  IMAGE_NAME: vsmetgud/media-portal
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
            - name: Clean Old Dependencies
        run: |
          rm -rf node_modules package-lock.json

      - name: Install Updated Dependencies
        run: npm install

      - name: Deduplicate Dependencies
        run: npm dedupe

      - name: Run npm audit
        run: npm audit --audit-level=critical || true
      
      # - name: SonarQube Scan
      #   uses: SonarSource/sonarqube-scan-action@master
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}  

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker Image
        run: |
          docker buildx build \
            --load \
            --tag $IMAGE_NAME:$IMAGE_TAG \
            --tag $IMAGE_NAME:latest \
            .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest    
  update-helm:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Values Update
        run: |
          git config user.name "vijay"
          git config user.email "vsmetgud@gmail.com"

          git pull origin main --rebase

          sed -i "s/tag: .*/tag: \"$IMAGE_TAG\"/" helm/media-portal/values.yaml

          git add helm/media-portal/values.yaml
          git commit -m "chore: update image tag to $IMAGE_TAG" || echo "No changes"

          git push origin main || echo "Push skipped"