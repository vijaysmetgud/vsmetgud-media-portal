server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Main UI
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static files
    location /css/ {}
    location /js/ {}

    # MEDIA FILES
    location /media/ {
        root /usr/share/nginx/html;

        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        charset utf-8;
    }
}