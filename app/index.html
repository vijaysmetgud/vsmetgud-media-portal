<script>
function updateClock() {
    const clockElement = document.getElementById('clock');
    if (clockElement) {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        clockElement.innerText = `${hours}:${minutes}:${seconds}`;
    }
}

// run immediately
updateClock();

// run every second
setInterval(updateClock, 1000);
</script>

<script>

/* ================= FILE INDEX ================= */

let allFiles = [];

async function loadFiles(){

    try{

        const response = await fetch("/media-index.json");

        allFiles = await response.json();

        console.log("Files indexed:", allFiles.length);
        console.log(allFiles.slice(0,10));

        renderFiles(allFiles);

    }
    catch(e){
        console.log("media-index.json not found");
    }

}

window.addEventListener("DOMContentLoaded", loadFiles);

/* ================= DISPLAY FILES ================= */

function renderFiles(files){

    const container = document.getElementById("fileContainer");

    container.innerHTML = "";

    if(files.length === 0){
        container.innerHTML = "<p>No files found</p>";
        return;
    }

    files.forEach(file => {

        const card = document.createElement("div");

        card.style.background="#1e293b";
        card.style.color = "#ffffff";
        card.style.padding="15px";
        card.style.borderRadius="10px";
        card.style.cursor="pointer";
        card.onmouseover = () => card.style.background="#334155";
        card.onmouseout = () => card.style.background="#1e293b";

        card.innerHTML = `
            <div style="font-size:13px;word-break:break-word">
                ${file}
            </div>
        `;

        card.onclick = () => {
            window.open("/media/" + encodeURIComponent(file), "_blank");
        };

        container.appendChild(card);

    });

}

/* ================= CATEGORY FILTER ================= */

function loadCategory(folder, element){

    document.querySelectorAll(".nav-btn")
        .forEach(btn => btn.classList.remove("active"));

    element.classList.add("active");

    let filtered;

    if(folder === ""){
        filtered = allFiles;
    }
    else{

        filtered = allFiles.filter(file => 
            file.includes(folder + "/") ||
            file.startsWith(folder)
        );

    }

    renderFiles(filtered);

}

/* ================= SMART FILE SEARCH ================= */

function findBestFile(query){

    query = query.toLowerCase();

    let bestScore = 0;
    let bestFile = null;

    allFiles.forEach(file=>{

        let name = file.toLowerCase();
        let score = 0;

        query.split(" ").forEach(word=>{
            if(name.includes(word)){
                score++;
            }
        });

        if(score > bestScore){
            bestScore = score;
            bestFile = file;
        }

    });

    return bestFile;
}


/* ================= SPEECH ================= */

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang="en-US";

    window.speechSynthesis.speak(speech);

}


/* ================= OPEN FILE ================= */

function openFile(file){

    if(!file){
        speak("File not found");
        return;
    }

    speak("Opening " + file);

    window.open("/media/" + encodeURIComponent(file), "_blank");

}


/* ================= CHAT ================= */

function sendMessage(){

    let input = document.getElementById("chatInput").value;
    let body = document.getElementById("chatBody");

    body.innerHTML += "<div><b>You:</b> "+input+"</div>";

    let file = findBestFile(input);

    if(file){

        body.innerHTML += "<div style='color:#22c55e'><b>AI:</b> Opening "+file+"</div>";
        openFile(file);

    }
    else{

        body.innerHTML += "<div style='color:red'><b>AI:</b> File not found</div>";
        speak("File not found");

    }

    document.getElementById("chatInput").value="";
    body.scrollTop = body.scrollHeight;

}


/* ================= ENTER KEY ================= */

window.addEventListener("DOMContentLoaded", () => {

    const input = document.getElementById("chatInput");

    if (input) {
        input.addEventListener("keypress", function(e){
            if(e.key === "Enter"){
                sendMessage();
            }
        });
    }

});

/* ================= CHAT TOGGLE ================= */

let chatOpen = true;

function toggleChat() {

    const chatbox = document.getElementById("chatbox");
    const toggleBtn = document.getElementById("chatToggle");

    if (chatOpen) {
        chatbox.style.display = "none";
        toggleBtn.style.display = "block";
    } else {
        chatbox.style.display = "block";
        toggleBtn.style.display = "none";
    }

    chatOpen = !chatOpen;
}

/* ================= THEME TOGGLE ================= */

function toggleTheme() {

    document.body.classList.toggle("light");

    // Save preference
    if (document.body.classList.contains("light")) {
        localStorage.setItem("theme", "light");
    } else {
        localStorage.setItem("theme", "dark");
    }
}

/* Load saved theme */
window.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "light") {
        document.body.classList.add("light");
    }
});
/* ================= VOICE RECOGNITION ================= */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition;

if(SpeechRecognition){

    recognition = new SpeechRecognition();

    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function(){
        console.log("Voice listening...");
    };

    recognition.onresult = function(event){

        let speech = event.results[0][0].transcript;

        console.log("Voice:", speech);

        document.getElementById("chatBody").innerHTML +=
            "<div><b>You (voice):</b> "+speech+"</div>";

        let file = findBestFile(speech);

        openFile(file);

    };

    recognition.onerror = function(event){
        console.log("Voice error:", event.error);
    };

}


/* ================= START VOICE ================= */

function startVoice(){

    if(recognition){

        recognition.start();

        speak("Listening");

    }

}


/* ================= METRICS ================= */

function fetchMetrics(){

    let cpu = Math.floor(Math.random()*40+30);
    let mem = Math.floor(Math.random()*30+50);
    let pods = Math.floor(Math.random()*5+3);

    document.getElementById("cpu").innerText = cpu + "%";
    document.getElementById("memory").innerText = mem + "%";
    document.getElementById("pods").innerText = pods;

    if(pods < 3){
        document.getElementById("health").innerText = "Warning";
    } else {
        document.getElementById("health").innerText = "Healthy";
    }

}

setInterval(fetchMetrics, 3000);
fetchMetrics();
