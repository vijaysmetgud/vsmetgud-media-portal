<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>Expense Tracker</title>

<link
    rel="stylesheet"
    href="css/expense.css"
/>

</head>

<body>

<div class="container">

    <h1>
        🎤 Expense Tracker
    </h1>

    <!-- USER SECTION -->

    <div class="userSection">

        <select
            id="userSelect"
            onchange="switchUser()"
        ></select>

        <button onclick="addNewUser()">
            + Add User
        </button>

        <button onclick="deleteUser()">
            ❌ Delete User
        </button>

    </div>

    <div class="formCard">

        <h3 id="currentUserName">
            User : Not Selected
        </h3>

        <input
            type="date"
            id="date"
        />

        <input
            type="text"
            id="item"
            placeholder="Item"
        />

        <input
            type="number"
            id="price"
            placeholder="Price"
        />

        <div class="buttonRow">

            <button onclick="addExpense()">
                Add Expense
            </button>

            <button onclick="startVoice()">
                🎤 Speak
            </button>

            <button onclick="downloadTextFile()">
                📄 Convert To Text
            </button>

            <button onclick="splitExpense()">
                💰 Split Share
            </button>

            <button onclick="startSplitVoice()">
                🎤 Split Voice
            </button>

        </div>

        <p id="voiceStatus"></p>

    </div>

    <!-- FILTERS -->

    <div class="filterButtons">

        <button onclick="showTodayExpenses()">
            Today
        </button>

        <button onclick="showMonthlyExpenses()">
            Month
        </button>

        <button onclick="showYearlyExpenses()">
            Year
        </button>

        <button onclick="showAllExpenses()">
            All
        </button>

        <button onclick="getExpensesByDate()">
            📅 Select Date
        </button>

    </div>

    <!-- SUMMARY -->

    <div class="summary">

        <div class="summaryCard">

            <h3>Today</h3>

            <p id="dailyTotal">
                ₹0
            </p>

        </div>

        <div class="summaryCard">

            <h3>Month</h3>

            <p id="monthlyTotal">
                ₹0
            </p>

        </div>

        <div class="summaryCard">

            <h3>Year</h3>

            <p id="yearlyTotal">
                ₹0
            </p>

        </div>

        <div class="summaryCard">

            <h3>Overall</h3>

            <p id="overallTotal">
                ₹0
            </p>

        </div>

    </div>

    <div class="buttonRow">

        <button onclick="openBarChartWindow()">
            📊 Open Expense Graph
        </button>

        <button onclick="openPieChartWindow()">
            🥧 Open Pie Graph
        </button>

    </div>

    <!-- EXPENSE LIST -->

    <div
        class="expenseList"
        id="expenseList"
    ></div>

    <!-- BAR CHART -->

    <div class="chartContainer">

        <canvas
            id="expenseChart"
        ></canvas>

    </div>

    <!-- SPLIT SHARE PANEL -->

    <div class="splitContainer">

        <h2>
            💰 Split Share History
        </h2>

        <div
            id="splitExpenseList"
            class="expenseList"
        ></div>

    </div>

    <!-- PIE CHART -->

    <div class="chartContainer">

        <canvas
            id="expensePieChart"
        ></canvas>

    </div>

</div>    

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/expense.js"></script>

</body>

</html>
