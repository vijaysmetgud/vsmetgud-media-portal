<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>Expense Tracker</title>

<link
    rel="stylesheet"
    href="css/expense.css"
/>

</head>

<body>

<div class="container">

    <h1>
        🎤 Expense Tracker
    </h1>

    <!-- USER SECTION -->

    <div class="userSection">

        <select
            id="userSelect"
            onchange="switchUser()"
        ></select>

        <button onclick="addNewUser()">
            + Add User
        </button>

        <button onclick="deleteUser()">
            ❌ Delete User
        </button>

    </div>

    <div class="topActionButtons">

        <button onclick="openBarChartWindow()">
            📊 Bar Graph
        </button>

        <button onclick="openPieChartWindow()">
            🥧 Pie Graph
        </button>

        <button onclick="openSplitGraphWindow()">
            💰 Split Share Graph
        </button>

        <button onclick="openLineChartWindow()">
            📈 Trend Graph
        </button>    

        <button onclick="showSettlement()">
            💰 Settlement
        </button>

        <button onclick="downloadSettlementReport()">
            📄 Report
        </button>

        <button onclick="shareSettlementWhatsApp()">
            📲 WhatsApp
        </button>

        <button onclick="sendSettlementEmail()">
            📧 Email
        </button>

        <button onclick="clearAllExpenseData()">
            🗑 Delete All Data
        </button>

    </div>

    <div class="formCard">

        <h3 id="currentUserName">
            User : Not Selected
        </h3>

        <input
            type="date"
            id="date"
        />

        <input
            type="text"
            id="item"
            placeholder="Item"
        />

        <input
            type="number"
            id="price"
            placeholder="Price"
        />

        <div class="buttonRow">

            <button onclick="addExpense()">
                Add Expense
            </button>

            <button onclick="startVoice()">
                🎤 Speak
            </button>

            <button onclick="downloadTextFile()">
                📄 Convert To Text
            </button>

            <button onclick="splitExpense()">
                💰 Split Share
            </button>

            <button onclick="startSplitVoice()">
                🎤 Split Voice
            </button>

        </div>

        <p id="voiceStatus"></p>

    </div>

    <!-- SUMMARY -->

    <div class="summary">

        <div class="summaryCard">

            <h3>Today</h3>

            <p id="dailyTotal">
                ₹0
            </p>

        </div>

        <div class="summaryCard">

            <h3>Month</h3>

            <p id="monthlyTotal">
                ₹0
            </p>

        </div>

        <div class="summaryCard">

            <h3>Year</h3>

            <p id="yearlyTotal">
                ₹0
            </p>

        </div>

        <div class="summaryCard">

            <h3>Overall</h3>

            <p id="overallTotal">
                ₹0
            </p>

        </div>

    </div>

    <!-- SHOW EXPENSE FOR -->

    <div class="expenseFilterCard">

        <h2>
            📂 Show Expenses For
        </h2>

        <div
            class="expenseFilterRow"
            onclick="showTodayExpenses()"
        >
            <span>Today</span>

            <span>
                Show today's expenses
            </span>
        </div>

        <div
            class="expenseFilterRow"
            onclick="showMonthlyExpenses()"
        >
            <span>Month</span>

            <span>
                Show monthly expenses
            </span>
        </div>

        <div
            class="expenseFilterRow"
            onclick="showYearlyExpenses()"
        >
            <span>Year</span>

            <span>
                Show yearly expenses
            </span>
        </div>

        <div
            class="expenseFilterRow"
            onclick="showAllExpenses()"
        >
            <span>All</span>

            <span>
                Show all expenses
            </span>
        </div>

        <div
            class="expenseFilterRow"
            onclick="getExpensesByDate()"
        >
            <span>
                📅 Select Date
            </span>

            <span>
                Show expenses for date
            </span>
        </div>

    </div>

    <!-- ACTION BUTTONS -->

    <!-- ================= GRAPH FILTER PANEL ================= -->

<div class="graphFilterPanel">

    <h2>
        📊 Expense Analytics
    </h2>

    <div class="graphControls">

        <!-- USER -->

        <div class="graphInput">

            <label>
                User
            </label>

            <select id="graphUser">

                <option value="current">
                    Current User
                </option>

                <option value="all">
                    All Users
                </option>

            </select>

        </div>

        <!-- GRAPH TYPE -->

        <div class="graphInput">

            <label>
                Graph Type
            </label>

            <select id="graphType">

                <option value="normal">
                    Normal Expenses
                </option>

                <option value="split">
                    Split Share Expenses
                </option>

                <option value="all">
                    All Expenses
                </option>

            </select>

        </div>

        <!-- FILTER -->

        <div class="graphInput">

            <label>
                Filter
            </label>

            <select id="graphFilter">

                <option value="today">
                    Today
                </option>

                <option value="date">
                    Selected Date
                </option>

                <option value="month">
                    Month
                </option>

                <option value="year">
                    Year
                </option>

                <option value="overall">
                    Overall Till Now
                </option>

            </select>

        </div>

        <!-- DATE -->

        <div class="graphInput">

            <label>
                Select Date
            </label>

            <input
                type="date"
                id="graphDate"
            />

        </div>

        <!-- MONTH -->

        <div class="graphInput">

            <label>
                Month
            </label>

            <input
                type="month"
                id="graphMonth"
            />

        </div>

        <!-- YEAR -->

        <div class="graphInput">

            <label>
                Year
            </label>

            <input
                type="number"
                id="graphYear"
                min="2000"
                max="2100"
                value="2026"
            />

        </div>

    </div>

</div>

    <!-- EXPENSE LIST -->

    <div
        class="expenseList"
        id="expenseList"
    ></div>

    <!-- BAR CHART -->

    <div class="chartContainer">

        <canvas
            id="expenseChart"
        ></canvas>

    </div>

    <!-- SPLIT SHARE PANEL -->

    <div class="splitContainer">

        <h2>
            💰 Split Share History
        </h2>

        <div
            id="splitExpenseList"
            class="expenseList"
        ></div>

    </div>

    <!-- PIE CHART -->

    <div class="chartContainer">

        <canvas
            id="expensePieChart"
        ></canvas>

    </div>

</div>    

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/expense.js"></script>

</body>

</html>
